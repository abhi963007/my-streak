name: Daily Streak Keeper

on:
  schedule:
    # Trigger daily at 12:30 AM UTC (6:00 AM Indian Standard Time)
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  commit-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants write permissions to the workflow to push commits

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to avoid conflicts

      - name: Generate Random Commits (200 to 500 with randomized times)
        run: |
          # Setup git config identity — must match your GitHub account email
          git config --global user.email "abhiramak963@gmail.com"
          git config --global user.name "abhi963007"

          # Always sync with the latest remote state first to avoid conflicts
          git fetch origin main
          git reset --hard origin/main

          # Generate a random commit count between 200 and 500
          commits=$(( RANDOM % 301 + 200 ))
          echo "Selected commit count for today: $commits"

          # Target date is today (UTC)
          target_date=$(date +%Y-%m-%d)

          # Append timestamps and commit iteratively with randomized times
          for i in $(seq 1 $commits)
          do
            # Generate random hour (00-23), minute (00-59), and second (00-59)
            hour=$(printf "%02d" $(( RANDOM % 24 )))
            min=$(printf "%02d" $(( RANDOM % 60 )))
            sec=$(printf "%02d" $(( RANDOM % 60 )))
            
            timestamp="${target_date} ${hour}:${min}:${sec}"
            
            echo "GitShine Cloud Commit: $timestamp - Commit #$i of $commits" >> contributions.txt
            git add contributions.txt
            
            # Commit with custom author and committer dates to distribute them randomly across 24 hours
            GIT_AUTHOR_DATE="$timestamp" GIT_COMMITTER_DATE="$timestamp" git commit -m "GitShine contribution update #$i [skip ci]"
          done

      - name: Push Commits back to GitHub
        run: |
          git push origin main
