name: Daily Streak Keeper

on:
  schedule:
    # 6x daily at :30 past 0,4,8,12,16,20 UTC (6:00 AM IST = 00:30 UTC)
    - cron: '30 */4 * * *'
  workflow_dispatch:

# Required permissions for GITHUB_TOKEN and gh CLI operations
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: daily-streak-${{ github.ref }}
  cancel-in-progress: false

jobs:
  commit-streak:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Run GitShine Multi-Dimensional Automator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_PAT: ${{ secrets.USER_PAT }}
        run: |
          bash scripts/gitshine.sh

